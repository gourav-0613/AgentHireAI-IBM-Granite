<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="560" fill="#0B1020"/>
  <text x="40" y="50" font-family="IBM Plex Sans, Inter, sans-serif" font-size="22" font-weight="700" fill="#F8FAFC">AgentHireAI — Brand Palette</text>

  <!-- Swatches -->
  <g font-family="IBM Plex Mono, monospace" font-size="13" fill="#F8FAFC">
    <rect x="40" y="80" width="150" height="90" rx="10" fill="#0B1020" stroke="#2A3050"/>
    <text x="50" y="185">Background</text><text x="50" y="203" fill="#8B93B0">#0B1020</text>

    <rect x="210" y="80" width="150" height="90" rx="10" fill="#5B5FFF"/>
    <text x="220" y="185">Primary</text><text x="220" y="203" fill="#8B93B0">#5B5FFF</text>

    <rect x="380" y="80" width="150" height="90" rx="10" fill="#00D4FF"/>
