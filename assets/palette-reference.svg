  </g>

  <line x1="40" y1="240" x2="860" y2="240" stroke="#2A3050"/>

  <text x="40" y="280" font-family="IBM Plex Sans, Inter, sans-serif" font-size="22" font-weight="700" fill="#F8FAFC">Typography</text>

  <text x="40" y="330" font-family="IBM Plex Sans, sans-serif" font-size="40" font-weight="700" fill="#F8FAFC">AgentHire<tspan fill="#00D4FF">AI</tspan></text>
